# ─────────────────────────────────────────────────────
# SERPENT RAG — Local Development Docker Compose
# No TLS, no Traefik, no monitoring — just the core stack
# Access: http://localhost:3000 (frontend + API proxy)
# ─────────────────────────────────────────────────────

services:
  # ── Frontend (React + Nginx reverse proxy) ─────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: serpent-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - serpent

  # ── Backend API (FastAPI) ──────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: serpent-api
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1", "--log-level", "info"]
    stop_signal: SIGINT
    stop_grace_period: 30s
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-serpent}:${POSTGRES_PASSWORD:-serpent123}@postgres:5432/${POSTGRES_DB:-serpent}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4j123}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-change-in-production}
      - ENVIRONMENT=development
      - LOG_LEVEL=info
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-local}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - EMBEDDING_DIMENSIONS=384
      - FRONTEND_URL=http://localhost:3000
      - UPLOAD_DIR=/app/uploads
      - WEB_SEARCH_API_KEY=${WEB_SEARCH_API_KEY:-}
      - WEB_SEARCH_PROVIDER=${WEB_SEARCH_PROVIDER:-tavily}
      - MULTI_TENANCY_ENABLED=false
      - SENTENCE_TRANSFORMERS_HOME=/app/models
      - TRANSFORMERS_CACHE=/app/models
      - HF_HOME=/app/models
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - upload-data:/app/uploads
      - model-cache:/app/models
    networks:
      - serpent
    # healthcheck managed externally — Dockerfile HEALTHCHECK removed to prevent restart loops

  # ── RAG Worker (Celery) ────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: serpent-worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app:celery_app worker -l info -c 2 -Q ingest,evaluate
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-serpent}:${POSTGRES_PASSWORD:-serpent123}@postgres:5432/${POSTGRES_DB:-serpent}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-neo4j123}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-local}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - EMBEDDING_DIMENSIONS=384
      - SENTENCE_TRANSFORMERS_HOME=/app/models
      - TRANSFORMERS_CACHE=/app/models
      - HF_HOME=/app/models
    depends_on:
      - api
      - redis
    volumes:
      - upload-data:/app/uploads
      - model-cache:/app/models
    networks:
      - serpent

  # ── PostgreSQL + pgvector ──────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: serpent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-serpent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-serpent123}
      POSTGRES_DB: ${POSTGRES_DB:-serpent}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - serpent
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-serpent}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: serpent-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis123}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - serpent
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant (Vector Store) ──────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: serpent-qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "6333:6333"
    networks:
      - serpent
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Neo4j (Graph Store) ────────────────────────────
  neo4j:
    image: neo4j:5.22-community
    container_name: serpent-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j123}"
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_server_memory_heap_max__size: "512M"
      NEO4J_server_memory_pagecache_size: "256M"
    volumes:
      - neo4j-data:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - serpent
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  neo4j-data:
  upload-data:
  model-cache:

networks:
  serpent:
    driver: bridge
