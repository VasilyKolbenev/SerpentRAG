# Serpent RAG — Prometheus Configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "serpent-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "serpent-api"

  - job_name: "traefik"
    static_configs:
      - targets: ["traefik:8082"]
        labels:
          service: "traefik"

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          service: "otel-collector"
