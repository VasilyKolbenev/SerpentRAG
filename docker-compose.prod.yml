version: "3.9"

# ─────────────────────────────────────────────────────
# 🐍 SERPENT RAG — Production Docker Compose
# Agentic RAG · Graph RAG · Hybrid RAG · Simple RAG
# ─────────────────────────────────────────────────────

x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  security_opt:
    - no-new-privileges:true
  read_only: true
  tmpfs:
    - /tmp

services:
  # ── API Gateway (Traefik) ──────────────────────────
  traefik:
    image: traefik:v3.1
    container_name: serpent-gateway
    <<: *common
    read_only: false
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.serpent.acme.tlschallenge=true"
      - "--certificatesresolvers.serpent.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.serpent.acme.storage=/letsencrypt/acme.json"
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access.log"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.entryPoint=metrics"
      - "--entrypoints.metrics.address=:8082"
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
      - traefik-logs:/var/log/traefik
    networks:
      - serpent-public
      - serpent-internal
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (React) ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: serpent-frontend
    <<: *common
    read_only: false
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=serpent"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.frontend-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.frontend-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.frontend-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.frontend-headers.headers.browserXssFilter=true"
      - "traefik.http.routers.frontend.middlewares=frontend-headers,rate-limit"
      - "traefik.http.middlewares.rate-limit.ratelimit.average=100"
      - "traefik.http.middlewares.rate-limit.ratelimit.burst=50"
    ports:
      - "3000:3000"
    networks:
      - serpent-public
      - serpent-internal
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── Backend API (FastAPI) ──────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: serpent-api
    <<: *common
    read_only: false
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-serpent}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-serpent}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${DOMAIN:-localhost}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=serpent"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
      - "traefik.http.middlewares.api-strip.stripprefix.prefixes=/api"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.average=50"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.burst=20"
      - "traefik.http.routers.api.middlewares=api-strip,api-ratelimit"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - upload-data:/app/uploads
      - model-cache:/app/models
    networks:
      - serpent-public
      - serpent-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G

  # ── RAG Worker (Celery) ────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: serpent-worker
    <<: *common
    read_only: false
    command: celery -A app.workers.celery_app:celery_app worker -l info -c 4 -Q ingest,evaluate
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-serpent}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-serpent}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-local}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-384}
      - SENTENCE_TRANSFORMERS_HOME=/app/models
      - HF_HOME=/app/models
      - TRANSFORMERS_OFFLINE=1
      - HF_HUB_OFFLINE=1
    depends_on:
      - api
      - redis
    volumes:
      - upload-data:/app/uploads
      - model-cache:/app/models
    networks:
      - serpent-internal
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G

  # ── PostgreSQL ─────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: serpent-postgres
    <<: *common
    read_only: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-serpent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-serpent}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - serpent-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-serpent}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  # ── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: serpent-redis
    <<: *common
    read_only: false
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --protected-mode yes
    volumes:
      - redis-data:/data
    networks:
      - serpent-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M

  # ── Qdrant (Vector Store) ──────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: serpent-qdrant
    <<: *common
    read_only: false
    environment:
      QDRANT__SERVICE__ENABLE_TLS: "false"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - serpent-internal
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  # ── Neo4j (Graph Store) ────────────────────────────
  neo4j:
    image: neo4j:5.22-community
    container_name: serpent-neo4j
    <<: *common
    read_only: false
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}"
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_server_memory_heap_max__size: "1G"
      NEO4J_server_memory_pagecache_size: "512M"
    volumes:
      - neo4j-data:/data
    networks:
      - serpent-internal
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  # ── OpenTelemetry Collector ────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: serpent-otel
    <<: *common
    read_only: false
    volumes:
      - ./infra/otel/config.yaml:/etc/otelcol/config.yaml:ro
    networks:
      - serpent-internal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── Prometheus ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: serpent-prometheus
    <<: *common
    read_only: false
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - serpent-internal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ── Grafana ────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: serpent-grafana
    <<: *common
    read_only: false
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: "https://${DOMAIN:-localhost}/grafana"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infra/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`${DOMAIN:-localhost}`) && PathPrefix(`/grafana`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=serpent"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    networks:
      - serpent-public
      - serpent-internal
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  traefik-certs:
  traefik-logs:
  postgres-data:
  redis-data:
  qdrant-data:
  neo4j-data:
  upload-data:
  model-cache:
  prometheus-data:
  grafana-data:

networks:
  serpent-public:
    driver: bridge
  serpent-internal:
    driver: bridge
    internal: true
